version: 2.1

orbs:
    aws-cli: circleci/aws-cli@4.1.2
    node: circleci/node@5.1.0
    terraform: circleci/terraform@3.2.1

commands:
    checkout-code:
        steps:
            - restore_cache:
                  keys:
                      - source-v1-{{ .Branch }}-{{ .Revision }}
                      - source-v1-{{ .Branch }}-
                      - source-v1-
            - checkout
            - run:
                  name: git Garbage Collection
                  command: git gc
            - save_cache:
                  key: source-v1-{{ .Branch }}-{{ .Revision }}
                  paths:
                      - '.git'

    build-application:
        steps:
            - setup-yarn
            - run:
                  name: Yarn build
                  command: yarn build
            - run:
                  name: Copy build directory to artifacts
                  command: |
                      mkdir -p artifacts/site
                      cp -r out/* artifacts/site/
            - persist_to_workspace:
                  root: ./
                  paths:
                      - artifacts

    install-packages:
        steps:
            - restore_cache:
                  name: Restore Package Cache
                  keys:
                      - package-v2-{{ checksum "package.json" }}
                      - package-v2-
            - node/install-packages:
                  pkg-manager: yarn
                  with-cache: false
            - save_cache:
                  name: Save Package Cache
                  key: package-v2-{{ checksum "package.json" }}
                  paths:
                      - ~/project/node_modules

    invalidate-distribution:
        steps:
            - attach_workspace:
                  at: ./
            - aws-cli/setup
            - run:
                  name: Invalidate CloudFront Distribution
                  command: |
                      aws cloudfront create-invalidation --distribution-id $(cat artifacts/cloudfront_distribution.txt) --paths "/*"

    setup-yarn:
        steps:
            - checkout-code
            - node/install-yarn
            - install-packages

    test-application:
        steps:
            - run:
                  name: Execute Vitest tests with Yarn
                  command: yarn run test:unit

    type-check:
        steps:
            - run:
                  name: Yarn Type Check
                  command: yarn run type-check

    upload-to-s3:
        steps:
            - attach_workspace:
                  at: ./
            - aws-cli/setup
            - run:
                  name: Upload site to S3 bucket
                  command: |
                      export AWS_DEFAULT_REGION=us-east-1
                      aws s3 sync ./artifacts/site/ s3://$(cat artifacts/bucket_name.txt) --delete

jobs:
    check-app:
        executor:
            name: node/default
            tag: '22'
        steps:
            - setup-yarn
            - run:
                  name: Run Prettier
                  command: yarn run format:check
            - run:
                  name: Run Lint
                  command: yarn run lint:check
            - type-check
            - test-application

    create-artifacts-directory:
        executor:
            name: node/default
            tag: '22'
        steps:
            - run:
                  name: Create artifacts directory
                  command: mkdir -p artifacts
            - persist_to_workspace:
                  root: ./
                  paths:
                      - artifacts

    copy-site-to-s3:
        executor: aws-cli/default
        steps:
            - upload-to-s3

    invalidate-cloudfront-distribution:
        executor: aws-cli/default
        steps:
            - invalidate-distribution

    terraform-build:
        executor:
            name: terraform/default
            tag: '1.11.4'
        steps:
            - checkout-code
            - attach_workspace:
                  at: ./
            - terraform/init:
                  path: ./static-site
            - terraform/validate:
                  path: ./static-site
            - terraform/fmt:
                  path: ./static-site
            - terraform/plan:
                  path: ./static-site
            - terraform/apply:
                  path: ./static-site
            - run:
                  name: Save bucket name
                  command: |
                      cd static-site
                      terraform output -raw bucket_name > ../artifacts/bucket_name.txt
                      terraform output -raw cloudfront_distribution > ../artifacts/cloudfront_distribution.txt
            - persist_to_workspace:
                  root: ./
                  paths:
                      - artifacts

    yarn-build:
        executor:
            name: node/default
            tag: '22'
        steps:
            - build-application

workflows:
    build:
        jobs:
            - check-app
            - create-artifacts-directory:
                  filters:
                      branches:
                          only: master
            - yarn-build:
                  requires:
                      - check-app
                      - create-artifacts-directory
                  filters:
                      branches:
                          only: master
            - terraform-build:
                  requires:
                      - check-app
                      - create-artifacts-directory
                  filters:
                      branches:
                          only: master
            - copy-site-to-s3:
                  requires:
                      - yarn-build
                      - terraform-build
                  filters:
                      branches:
                          only: master
            - invalidate-cloudfront-distribution:
                  requires:
                      - copy-site-to-s3
                  filters:
                      branches:
                          only: master
